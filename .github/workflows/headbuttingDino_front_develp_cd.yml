name: CD - Frontend (Dev)
on:
  push:
    branches: ["develop"]
jobs:
  deploy:
    runs-on: [self-hosted, local]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Build and Push Docker Image
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/devticket-frontend:dev
          docker build -t $IMAGE .
          docker push $IMAGE
      - name: Deploy to k3s
        run: |
          sudo /usr/local/bin/k3s kubectl -n devticket set image deployment/frontend frontend=${{ secrets.DOCKERHUB_USERNAME }}/devticket-frontend:dev
          sudo /usr/local/bin/k3s kubectl -n devticket rollout restart deployment/frontend
