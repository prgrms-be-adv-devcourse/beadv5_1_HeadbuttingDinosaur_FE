name: CD - Frontend (AWS k3s)

on:
  push:
    branches: ["main"]
    paths:
      - "frontend/**"
      - ".github/workflows/cd-frontend-aws.yml"

  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cd-frontend-aws
  cancel-in-progress: true

env:
  SERVICE_NAME: frontend
  DEPLOYMENT_NAME: frontend
  CONTAINER_NAME: frontend
  DIR_NAME: frontend
  IMAGE_NAME: devticket-frontend

jobs:
  build:
    name: Build and Push Frontend Image
    runs-on: ubuntu-latest

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate frontend Docker context
        run: |
          test -f "${DIR_NAME}/Dockerfile" || {
            echo "ERROR: ${DIR_NAME}/Dockerfile not found"
            exit 1
          }

          echo "Frontend Docker context:"
          find "${DIR_NAME}" -maxdepth 2 -type f | sort | head -100

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push Docker image
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "ERROR: DOCKERHUB_USERNAME secret is empty"
            exit 1
          fi

          IMAGE_SHA="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${GITHUB_SHA}"
          IMAGE_LATEST="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:latest"

          docker build \
            -f "${DIR_NAME}/Dockerfile" \
            -t "$IMAGE_SHA" \
            -t "$IMAGE_LATEST" \
            "${DIR_NAME}"

          docker push "$IMAGE_SHA"
          docker push "$IMAGE_LATEST"

  deploy:
    name: Deploy Frontend to AWS k3s
    needs: build
    runs-on: [self-hosted, aws, k3s, infra, frontend]

    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}

    steps:
      - name: Deploy to AWS k3s
        run: |
          if [ -z "$DOCKERHUB_USERNAME" ]; then
            echo "ERROR: DOCKERHUB_USERNAME secret is empty"
            exit 1
          fi

          IMAGE_SHA="${DOCKERHUB_USERNAME}/${IMAGE_NAME}:${GITHUB_SHA}"

          sudo /usr/local/bin/k3s kubectl -n devticket set image \
            deployment/${DEPLOYMENT_NAME} \
            ${CONTAINER_NAME}=${IMAGE_SHA}

          sudo /usr/local/bin/k3s kubectl -n devticket scale \
            deployment/${DEPLOYMENT_NAME} \
            --replicas=1

          sudo /usr/local/bin/k3s kubectl -n devticket rollout status \
            deployment/${DEPLOYMENT_NAME} \
            --timeout=180s

          sudo /usr/local/bin/k3s kubectl -n devticket get pods \
            -l app=${SERVICE_NAME} \
            -o wide

      - name: Print deployed image
        run: |
          sudo /usr/local/bin/k3s kubectl -n devticket get deployment/${DEPLOYMENT_NAME} \
            -o jsonpath='{.spec.template.spec.containers[0].image}'
          echo
