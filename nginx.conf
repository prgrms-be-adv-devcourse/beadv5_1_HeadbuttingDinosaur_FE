server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    resolver 10.43.0.10 valid=10s;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        set $upstream "http://gateway.devticket.svc.cluster.local:8080";
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ↓ 추가: Spring Security OAuth2 시작 엔드포인트
    location /oauth2/ {
        set $upstream "http://gateway.devticket.svc.cluster.local:8080";
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ↓ 추가: Google OAuth 콜백 (Spring 기본 경로 /login/oauth2/code/google)
    location /login/oauth2/ {
        set $upstream "http://gateway.devticket.svc.cluster.local:8080";
        proxy_pass $upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
